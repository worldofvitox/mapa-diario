<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chum - Rastreo en Vivo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @font-face { font-family: 'Gotham'; src: url('Gotham%20Bold.otf') format('opentype'); font-weight: bold; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Gotham', sans-serif; background: #f4f6f8; }
        #map { height: 100%; width: 100%; z-index: 1; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(1, 30, 65, 0.9); z-index: 9999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center; padding: 20px; box-sizing: border-box;
        }
        #overlay h2 { font-size: 24px; margin-bottom: 10px; }
        #overlay p { font-size: 14px; opacity: 0.8; font-weight: normal; }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Cargando Taller...</h2>
        <p>Verificando enlace seguro.</p>
    </div>

    <div id="map"></div>

    <script>
        // 1. Configuration
        const FIREBASE_URL = 'https://vantracker-7cdef-default-rtdb.firebaseio.com/vans.json';
        
        // 2. The Time-Based Security Hash (Must match daily_map.py exactly)
        function getHourlyToken(offsetHours = 0) {
            let d = new Date();
            d.setHours(d.getHours() + offsetHours);
            let str = d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate() + "-" + d.getHours();
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                let char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash; // Convert to 32bit integer
            }
            return String(Math.abs(hash) % 10000).padStart(4, '0');
        }

        // 3. Extract and Validate the URL Parameter
        const urlParams = new URLSearchParams(window.location.search);
        const rawParam = urlParams.get('mecanico'); // e.g. "juan8341"
        const overlay = document.getElementById('overlay');
        let targetMechanic = null;

        if (!rawParam || rawParam.length <= 4) {
            overlay.innerHTML = "<h2>Enlace Inválido</h2><p>Faltan parámetros de seguridad.</p>";
        } else {
            // Extract the 4-digit token from the end, and the name from the beginning
            const urlToken = rawParam.slice(-4);
            const urlName = rawParam.slice(0, -4).toLowerCase(); // "juan" or "seba"

            // Allow the token to be valid for the current hour OR the previous hour
            const validTokenCurrent = getHourlyToken(0);
            const validTokenPrevious = getHourlyToken(-1);

            if (urlToken === validTokenCurrent || urlToken === validTokenPrevious) {
                targetMechanic = urlName;
                overlay.style.display = 'none'; // Valid! Hide overlay.
            } else {
                overlay.innerHTML = "<h2>Enlace Expirado</h2><p>Por seguridad, los enlaces de seguimiento expiran en 1 hora. Comunícate con tu mecánico si necesitas ayuda.</p>";
            }
        }

        // 4. Initialize Map (Only if Valid)
        if (targetMechanic) {
            const map = L.map('map', { zoomControl: false }).setView([-33.452, -70.578], 15);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            let vanMarker = null;

            function fetchVanLocation() {
                fetch(FIREBASE_URL)
                    .then(res => res.json())
                    .then(data => {
                        if (!data) return;
                        
                        // Look for the specific mechanic in the database (case-insensitive)
                        for (const [dbName, coords] of Object.entries(data)) {
                            if (dbName.toLowerCase() === targetMechanic) {
                                
                                // Set Icon
                                let iconUrl = 'base_icon.png';
                                if (targetMechanic === 'seba') iconUrl = 'seba_icon.png';
                                if (targetMechanic === 'juan') iconUrl = 'juan_icon.png';
                                
                                if (!vanMarker) {
                                    // Create marker on first load
                                    let vanIcon = L.icon({ iconUrl: iconUrl, iconSize: [40, 40], iconAnchor: [20, 20] });
                                    vanMarker = L.marker([coords.lat, coords.lng], {icon: vanIcon}).addTo(map);
                                    map.setView([coords.lat, coords.lng], 16); // Auto-center
                                } else {
                                    // Move existing marker smoothly
                                    vanMarker.setLatLng([coords.lat, coords.lng]);
                                    // Optionally keep map centered on van as it moves:
                                    // map.panTo([coords.lat, coords.lng]); 
                                }
                                break; 
                            }
                        }
                    })
                    .catch(err => console.error("Error Firebase:", err));
            }

            // Start tracking
            fetchVanLocation();
            setInterval(fetchVanLocation, 5000); // Check every 5 seconds
        }
    </script>
</body>
</html>
