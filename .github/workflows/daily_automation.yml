name: Generate Daily Mechanic Map

on:
  schedule:
    # 9:00 AM Santiago is 13:00 UTC (during standard time)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Map Script
        env:
          GMAPS_API_KEY: ${{ secrets.GMAPS_API_KEY }}
        run: python daily_map.py

      - name: Commit and Push Map
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add mechanic_route.html
          git commit -m "Update daily map" || exit 0
          git push