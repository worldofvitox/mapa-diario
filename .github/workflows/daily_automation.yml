name: Generate Daily Mechanic Map

on:
  schedule:
    # 9:00 AM Santiago is 13:00 UTC
    - cron: '0 12 * * *'
  workflow_dispatch: 
  push:
    branches: [main]

permissions:
  contents: write  # <--- This is the fix for Error 128

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated version

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated version
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Map Script
        env:
          GMAPS_API_KEY: ${{ secrets.GMAPS_API_KEY }}
        run: python daily_map.py

      - name: Commit and Push Map
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mechanic_route.html
          git commit -m "Update daily map [skip ci]" || exit 0
          git push