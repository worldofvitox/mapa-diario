name: Master Map Generator

on:
  schedule:
    - cron: '*/30 * * * *'
  repository_dispatch:
    types: [calendar_update]
  workflow_dispatch:

# --- THE ARMOR: Prevents double-triggers from crashing the system ---
concurrency:
  group: map-generation
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests googlemaps folium pytz icalendar

      - name: Run Mobile Map Generator
        env:
          GMAPS_API_KEY: ${{ secrets.GMAPS_API_KEY }}
        run: python daily_map.py

      - name: Run Desktop Map Generator & Update CSV
        env:
          GMAPS_API_KEY: ${{ secrets.GMAPS_API_KEY }}
        run: python desktop_map.py

      - name: Commit and Push All Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add all HTML files and the CSV
          git add *.html distances.csv
          
          git commit -m "Real-time update: Mobile, Desktop, and Distances" -a || exit 0
          
          git pull origin main --rebase
          
          git push origin main