name: Master Map Generator

on:
  repository_dispatch:
    types: [calendar_update]
  workflow_dispatch:

concurrency:
  group: map-generation
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests googlemaps folium pytz icalendar

      - name: Run Desktop Map Generator
        env:
          GMAPS_API_KEY: ${{ secrets.GMAPS_API_KEY }}
        run: python desktop_map.py

      - name: Generate ruta_diaria.php
        env:
          GMAPS_API_KEY: ${{ secrets.GMAPS_API_KEY }}
        run: python ruta_diaria.py

      - name: Upload maps and data to Hosty via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          # 1. Upload Mechanic map
          curl -T ruta_diaria.php ftp://$FTP_HOST/ruta_diaria.php --user "$FTP_USER:$FTP_PASS"
          
          # 2. Upload Appointments Data (CRITICAL for Optimizer)
          curl -T appointments_cache.json ftp://$FTP_HOST/appointments_cache.json --user "$FTP_USER:$FTP_PASS"
          
          # 3. Upload all Desktop Maps and Optimizer
          for file in *.html; do
            curl -T "$file" "ftp://$FTP_HOST/$file" --user "$FTP_USER:$FTP_PASS"
          done

      - name: Commit and Push Cache Updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 1. Add only the JSON files we want to keep
          git add appointments_cache.json routing_cache.json || exit 0
          
          # 2. Commit them
          git commit -m "Update routing and appointment caches [skip ci]" || exit 0
          
          # 3. Use autostash to handle the generated HTML/PHP files during the pull
          git pull origin main --rebase --autostash
          
          # 4. Final push
          git push origin main