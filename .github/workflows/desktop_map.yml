name: Master Map Generator

on:
  repository_dispatch:
    types: [calendar_update]
  workflow_dispatch:

concurrency:
  group: map-generation
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests googlemaps folium pytz icalendar

      - name: Run Desktop Map Generator
        env:
          GMAPS_API_KEY: ${{ secrets.GMAPS_API_KEY }}
        run: python desktop_map.py

      - name: Generate ruta_diaria.php
        env:
          GMAPS_API_KEY: ${{ secrets.GMAPS_API_KEY }}
        run: python ruta_diaria.py

      - name: Upload maps to Hosty via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          # 1. Upload Mechanic map
          curl -T ruta_diaria.php ftp://$FTP_HOST/ruta_diaria.php --user "$FTP_USER:$FTP_PASS"
          
          # 2. Upload Desktop Maps and Optimizer
          for file in *.html; do
            curl -T "$file" "ftp://$FTP_HOST/$file" --user "$FTP_USER:$FTP_PASS"
          done

      - name: Commit and Push All Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "Hybrid deploy: Desktop, Optimizer, and Ruta Diaria" -a || exit 0
          git pull origin main --rebase
          git push origin main